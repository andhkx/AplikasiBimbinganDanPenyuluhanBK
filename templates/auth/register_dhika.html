<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Header BK</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
  }

  .header {
    display: flex;
    align-items: center;
    padding: 10px 20px;
  }

  .logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-right: 15px;
  }

  .text-container {
    line-height: 1.2;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
  }

  .subtitle {
    font-size: 18px;
    color: #6A1B9A; /* ungu */
    font-weight: 600;
  }

  .school {
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="Logo Sekolah" class="logo">

  <div class="text-container">
    <div class="title">Skadaci BK</div>
    <div class="subtitle">Bimbingan dan Konseling</div>
    <div class="school">SMK Negeri 2 Cimahi</div>
  </div>
</div>

</body>
</html>
