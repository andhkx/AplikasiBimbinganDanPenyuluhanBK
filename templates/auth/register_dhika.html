<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - BK SMKN 2 Cimahi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .grad-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-top-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: 24px 24px 0 0;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            background-size: 200%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
        .circle-float { animation: float 8s ease-in-out infinite; }
        .circle-float:nth-child(2) { animation-delay: 2s; }
        .circle-float:nth-child(3) { animation-delay: 4s; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        .input-dhika:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
        .input-dhika { transition: all 0.2s; }
        .card-in { animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        select.input-dhika { background-color: #f8fafc; }
        select.input-dhika option { background: white; }
    </style>
</head>
<body class="min-h-screen grad-bg flex items-start justify-center p-4 relative" style="overflow-y:auto;overflow-x:hidden;">

    <div class="fixed inset-0 pointer-events-none" style="z-index:0;">
        <div class="circle-float absolute w-64 h-64 rounded-full bg-white opacity-5 -top-16 -left-16"></div>
        <div class="circle-float absolute w-48 h-48 rounded-full bg-white opacity-5 top-1/2 -right-12"></div>
        <div class="circle-float absolute w-32 h-32 rounded-full bg-white opacity-5 -bottom-8 left-1/3"></div>
    </div>

    <div class="card-in card-top-bar relative bg-white rounded-3xl shadow-2xl w-full max-w-lg my-6" style="padding:32px 24px 24px;z-index:1;">

        <div class="text-center mb-6">
            <div class="w-16 h-16 grad-bg rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                <i class="fas fa-user-plus text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Daftar Akun Siswa</h2>
            <p class="text-gray-500 text-sm mt-1">SMK Negeri 2 Cimahi</p>
        </div>

        {% with message, category = get_flash_dhika() %}
        {% if message %}
        <div class="flex items-center gap-3 p-3 rounded-xl mb-4 text-sm
            {% if category == 'error' %}bg-red-50 border border-red-200 text-red-700
            {% else %}bg-green-50 border border-green-200 text-green-700{% endif %}">
            <i class="fas fa-{% if category == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
            {{ message }}
        </div>
        {% endif %}
        {% endwith %}

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-5 flex gap-2 text-sm text-amber-700">
            <i class="fas fa-info-circle mt-0.5 flex-shrink-0"></i>
            <span>Pendaftaran memerlukan <strong>persetujuan Guru BK</strong> sebelum akun aktif.</span>
        </div>

        <form method="POST" action="{{ url_for('register_dhika') }}" id="formRegDhika">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">NIS <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-id-card absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" name="nis_dhika" placeholder="Nomor Induk Siswa"
                               class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Nama Lengkap <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" name="nama_dhika" placeholder="Nama sesuai raport"
                               class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Kelas <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-graduation-cap absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none"></i>
                        <select name="kelas_dhika" id="kelasDhika" class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required onchange="updateRombelDhika()">
                            <option value="" disabled selected>Pilih</option>
                            <option value="X">X</option>
                            <option value="XI">XI</option>
                            <option value="XII">XII</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Jurusan <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-book absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none"></i>
                        <select name="jurusan_dhika" id="jurusanDhika" class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required onchange="updateRombelDhika()">
                            <option value="" disabled selected>Pilih</option>
                            <option value="RPL">RPL</option>
                            <option value="Animasi">Animasi</option>
                            <option value="DKV">DKV</option>
                            <option value="Kimia">Kimia</option>
                            <option value="Mesin">Mesin</option>
                            <option value="Meka">Meka</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Rombel <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-users absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none"></i>
                        <select name="rombel_dhika" id="rombelDhika" class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required disabled>
                            <option value="" disabled selected>Pilih jurusan dulu</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Username <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-at absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" name="username_dhika" placeholder="Buat username unik"
                               class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">No. HP Orang Tua</label>
                    <div class="relative">
                        <i class="fas fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" name="no_ortu_dhika" placeholder="Opsional"
                               class="input-dhika w-full pl-9 pr-3 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Password <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" name="password_dhika" id="pwDhika" placeholder="Min. 6 karakter"
                               class="input-dhika w-full pl-9 pr-9 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required>
                        <button type="button" onclick="togglePw('pwDhika','icoPwDhika')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye text-sm" id="icoPwDhika"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1.5">Konfirmasi Password <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="password" name="konfirmasi_dhika" id="konfDhika" placeholder="Ulangi password"
                               class="input-dhika w-full pl-9 pr-9 py-2.5 border-2 border-gray-200 rounded-xl text-sm bg-gray-50" required>
                        <button type="button" onclick="togglePw('konfDhika','icoKonfDhika')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <i class="fas fa-eye text-sm" id="icoKonfDhika"></i>
                        </button>
                    </div>
                    <p id="matchInfoDhika" class="text-xs mt-1 hidden"></p>
                </div>
            </div>

            <button type="submit" id="btnRegDhika"
                    class="w-full py-3 grad-bg text-white font-semibold rounded-xl hover:opacity-90 hover:-translate-y-0.5 transition-all duration-200 shadow-md hover:shadow-lg text-sm">
                <i class="fas fa-user-plus mr-2"></i>Kirim Pendaftaran
            </button>
        </form>

        <div class="mt-5 pt-4 border-t border-gray-100 text-center text-sm text-gray-500">
            Sudah punya akun?
            <a href="{{ url_for('login_dhika') }}" class="font-semibold ml-1" style="color:#667eea;">Masuk di sini</a>
        </div>

        <p class="text-center text-xs text-gray-400 mt-3">&copy; 2026 Andhika Andriana Putra — XI RPL A</p>
    </div>

    <script>
        function togglePw(inputId, iconId) {
            var input = document.getElementById(inputId);
            var icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash text-sm';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye text-sm';
            }
        }

        var rombelMap = {
            'RPL': ['A','B'],
            'Animasi': ['A','B'],
            'Mesin': ['A','B'],
            'DKV': ['A','B','C'],
            'Kimia': ['A','B','C'],
            'Meka': ['A','B','C','D']
        };

        function updateRombelDhika() {
            var jurusan = document.getElementById('jurusanDhika').value;
            var sel = document.getElementById('rombelDhika');
            sel.innerHTML = '<option value="" disabled selected>Pilih rombel</option>';
            if (jurusan && rombelMap[jurusan]) {
                rombelMap[jurusan].forEach(function(r) {
                    var opt = document.createElement('option');
                    opt.value = r;
                    opt.textContent = r;
                    sel.appendChild(opt);
                });
                sel.disabled = false;
            } else {
                sel.innerHTML = '<option value="" disabled selected>Pilih jurusan dulu</option>';
                sel.disabled = true;
            }
        }

        document.getElementById('konfDhika').addEventListener('input', function() {
            var pw = document.getElementById('pwDhika').value;
            var info = document.getElementById('matchInfoDhika');
            if (this.value.length === 0) { info.className = 'text-xs mt-1 hidden'; return; }
            if (this.value === pw) {
                info.textContent = '✓ Password cocok';
                info.className = 'text-xs mt-1 text-green-600';
            } else {
                info.textContent = '✗ Password tidak cocok';
                info.className = 'text-xs mt-1 text-red-500';
            }
        });

        document.getElementById('formRegDhika').addEventListener('submit', function() {
            var btn = document.getElementById('btnRegDhika');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Mengirim...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
